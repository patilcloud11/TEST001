name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tf-fixed/tf-fixed/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './tf-fixed/tf-fixed/backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Lint (Optional)
        run: npm run lint || echo "No lint script found"

      - name: Run Tests
        run: npm test || echo "No tests found"

  deploy:
    name: Deploy to EC2
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Using AWS SSM to trigger a deployment script on the EC2 instances
      # This assumes the instances have a tag 'Role: Backend'
      - name: Deploy via SSM Run Command
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Role,Values=Backend" \
            --parameters 'commands=["cd /opt/family-finance-backend && git pull && npm install --production && pm2 restart all"]' \
            --comment "Deploying backend update"
